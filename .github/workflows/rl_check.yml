name: RL Check Multiple Files

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  rl-check:
    name: Check ${{ matrix.file }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        file:
          - src/main.rl
          - src/html_tags/tags.rl
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Run RL check on ${{ matrix.file }}
        uses: MohamedGonem/rl-check@main
        with:
          file: ${{ matrix.file }}
